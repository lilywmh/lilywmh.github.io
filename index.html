  <script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="ParticleField.jsx">
    function ParticleField() {
      const canvasRef = React.useRef(null);
      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animId;

        const readColors = () => {
          const r = getComputedStyle(document.documentElement);
          return ['--p1','--p2','--p3','--p4','--p5'].map(n => r.getPropertyValue(n).trim()).filter(Boolean);
        };
        let colors = readColors();

        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };

        class Particle {
          constructor() { this.reset(true); }
          reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 200 + 90;
            this.color = colors[Math.floor(Math.random() * colors.length)] || '#E0D4FF';
            const dk = document.documentElement.classList.contains('dark');
            this.opacity = dk ? Math.random() * 0.38 + 0.18 : Math.random() * 0.22 + 0.08;
            this.vx = (Math.random() - 0.5) * 0.25;
            this.vy = (Math.random() - 0.5) * 0.25;
          }
          update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < -240 || this.x > canvas.width + 240 || this.y < -240 || this.y > canvas.height + 240) this.reset();
          }
          draw() {
            const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            g.addColorStop(0, this.color); g.addColorStop(1, 'transparent');
            ctx.globalAlpha = this.opacity; ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
          }
        }

        const particles = Array.from({ length: 20 }, () => new Particle());
        const animate = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(p => { p.update(); p.draw(); });
          animId = requestAnimationFrame(animate);
        };

        const onPalette = () => { colors = readColors(); particles.forEach(p => { p.color = colors[Math.floor(Math.random() * colors.length)] || p.color; }); };
        const onTheme   = () => { particles.forEach(p => p.reset()); };

        window.addEventListener('resize', resize);
        window.addEventListener('lw:palette-change', onPalette);
        window.addEventListener('lw:theme-change', onTheme);
        resize(); animate();

        return () => {
          window.removeEventListener('resize', resize);
          window.removeEventListener('lw:palette-change', onPalette);
          window.removeEventListener('lw:theme-change', onTheme);
          cancelAnimationFrame(animId);
        };
      }, []);

      return <canvas ref={canvasRef} className="fixed inset-0 -z-10 pointer-events-none" aria-hidden="true" />;
    }
    window.ParticleField = ParticleField;
  </script>

  <!-- App shell -->
  <script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="app.jsx">
    const PALETTES = {
      'monet':  { label: 'Monet (default)', swatches: ['#E0D4FF','#C8DCBE','#FFD2D2'], bodyBg: '#FBFBFD', vars: { '--p1':'#E0D4FF','--p2':'#C8DCBE','--p3':'#B4DCF0','--p4':'#FFD2D2','--p5':'#FDE68A' } },
      'mint':   { label: 'Mint Breeze',     swatches: ['#CDEFDA','#D7F0E8','#B6E2C6'], bodyBg: '#F4FAF6', vars: { '--p1':'#CDEFDA','--p2':'#D7F0E8','--p3':'#B6E2C6','--p4':'#E8F5ED','--p5':'#C7EFDD' } },
      'blue':   { label: 'Cool Blue',       swatches: ['#C7DBFB','#D9E8FA','#E8EEF8'], bodyBg: '#F4F7FC', vars: { '--p1':'#C7DBFB','--p2':'#D9E8FA','--p3':'#B4DCF0','--p4':'#E8EEF8','--p5':'#CDE1F5' } },
      'purple': { label: 'Soft Purple',     swatches: ['#E0D4FF','#EADCFB','#D8C8F5'], bodyBg: '#FAF7FD', vars: { '--p1':'#E0D4FF','--p2':'#EADCFB','--p3':'#D8C8F5','--p4':'#F0E7FC','--p5':'#CAB8F0' } },
    };

    function applyPalette(key, isDark) {
      const p = PALETTES[key] || PALETTES['monet'];
      const root = document.documentElement;
      Object.entries(p.vars).forEach(([k, v]) => root.style.setProperty(k, v));
      if (!isDark) document.body.style.background = p.bodyBg;
      window.dispatchEvent(new CustomEvent('lw:palette-change'));
    }

    function TweaksPanel({ palette, setPalette, visible }) {
      const { theme } = React.useContext(window.AppContext);
      const dk = theme === 'dark';
      if (!visible) return null;
      return (
        <div className={`fixed right-5 bottom-5 z-[9999] w-[260px] rounded-[24px] border backdrop-blur-2xl shadow-2xl p-4
          ${dk ? 'dk-card border-purple-900/40' : 'border-white/80 bg-white/85'}`}>
          <div className="flex items-center justify-between mb-3">
            <div className={`text-sm font-semibold ${dk ? 'dk-t1' : 'text-slate-900'}`}>Tweaks</div>
            <div className={`text-[10px] uppercase tracking-[0.2em] ${dk ? 'dk-t3' : 'text-slate-400'}`}>Palette</div>
          </div>
          <div className="grid gap-2">
            {Object.entries(PALETTES).map(([key, p]) => {
              const sel = key === palette;
              return (
                <button key={key} onClick={() => setPalette(key)}
                  className={`flex items-center gap-3 px-3 py-2 rounded-xl border transition-all text-left
                    ${sel ? (dk ? 'bg-violet-950/60 border-violet-700' : 'bg-indigo-50 border-indigo-300')
                          : (dk ? 'bg-purple-950/30 border-purple-900/40 hover:bg-purple-900/40' : 'bg-white/70 border-slate-200 hover:bg-white')}`}>
                  <div className="flex">
                    {p.swatches.map((c, i) => (
                      <span key={i} className="w-4 h-4 border border-black/10" style={{
                        background: c,
                        borderTopLeftRadius: i===0?4:0, borderBottomLeftRadius: i===0?4:0,
                        borderTopRightRadius: i===p.swatches.length-1?4:0, borderBottomRightRadius: i===p.swatches.length-1?4:0,
                        borderLeft: i===0?'1px solid rgba(0,0,0,0.08)':'none',
                      }} />
                    ))}
                  </div>
                  <span className={`text-[13px] ${sel ? (dk?'font-semibold text-violet-300':'font-semibold text-indigo-700') : (dk?'font-medium dk-t2':'font-medium text-slate-700')}`}>
                    {p.label}
                  </span>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const initial = (window.__TWEAKS__ && window.__TWEAKS__.palette) || 'monet';
      const [palette, setPaletteState] = React.useState(PALETTES[initial] ? initial : 'monet');
      const [tweaksOpen, setTweaksOpen] = React.useState(false);
      const [lang, setLang] = React.useState('en');
      const [theme, setTheme] = React.useState('light');
      const dk = theme === 'dark';

      React.useEffect(() => { applyPalette(palette, dk); }, [palette]);

      React.useEffect(() => {
        const html = document.documentElement;
        if (dk) {
          html.classList.add('dark');
        } else {
          html.classList.remove('dark');
          applyPalette(palette, false);
        }
        window.dispatchEvent(new CustomEvent('lw:theme-change'));
      }, [theme]);

      React.useEffect(() => {
        const fn = (e) => {
          const d = e.data || {};
          if (d.type === '__activate_edit_mode')   setTweaksOpen(true);
          if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', fn);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', fn);
      }, []);

      const setPalette = (key) => {
        setPaletteState(key);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { palette: key } }, '*');
      };

      const ctx = React.useMemo(() => ({ lang, theme, setLang, setTheme }), [lang, theme]);

      return (
        <window.AppContext.Provider value={ctx}>
          <ParticleField />
          <Nav2 />
          <main>
            <Hero2 />
            <Work2 />
            <Experience2 />
            <Skills2 />
            <Beyond2 />
            <Contact2 />
          </main>
          <Footer2 />
          <TweaksPanel palette={palette} setPalette={setPalette} visible={tweaksOpen} />
        </window.AppContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
